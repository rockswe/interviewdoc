<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Google doc to practice for SWE interviews, when you have to write code in a Google Doc with no autocomplete and no way to test it."
    />
    <title>Interview Doc</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app-shell" class="app-shell">
      <aside id="problem-panel" class="problem-panel" aria-label="Problem statement">
        <header class="problem-toolbar">
          <span>Problem</span>
          <button id="panel-close" type="button" aria-label="Hide problem panel" title="Hide problem panel">
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <path d="m12.5 4-6 6 6 6" />
            </svg>
          </button>
        </header>

        <div class="problem-scroll">
          <section class="screenshot-area" aria-label="Problem screenshot">
            <div id="screenshot-empty" class="screenshot-empty">
              <p class="screenshot-hint">Paste a screenshot here</p>
              <p class="screenshot-note">Take a screenshot of the problem and paste it (Cmd/Ctrl+V), or</p>
              <button id="screenshot-upload" class="screenshot-upload" type="button">Upload image</button>
              <input id="screenshot-file" type="file" accept="image/*" hidden />
            </div>

            <div id="screenshot-view" class="screenshot-view" hidden>
              <img id="screenshot-image" class="screenshot-image" alt="Problem screenshot" />
              <button id="screenshot-delete" class="screenshot-delete" type="button">Delete</button>
            </div>
          </section>
        </div>
      </aside>

      <div id="panel-resizer" class="panel-resizer" role="separator" aria-label="Resize problem panel" aria-orientation="vertical" tabindex="0"></div>

      <main class="canvas">
        <button id="panel-open" class="panel-open" type="button" aria-label="Show problem panel" title="Show problem panel">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <rect x="3" y="3" width="14" height="14" rx="2" />
            <path d="M8 3v14m3-10h3m-3 3h3m-3 3h2" />
          </svg>
        </button>

        <section class="page" aria-label="Interview document">
          <div class="editor-surface">
            <pre
              id="code-editor"
              class="code-editor"
              contenteditable="true"
              role="textbox"
              aria-label="Interview document"
              aria-multiline="true"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            ></pre>
          </div>
        </section>
      </main>
    </div>

    <div class="font-controls" role="group" aria-label="Editor controls">
      <select id="language-select" aria-label="Programming language" title="Programming language">
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
        <option value="go">Go</option>
        <option value="plain">Plain text</option>
      </select>
      <button id="font-decrease" type="button" aria-label="Decrease font size" title="Decrease font size (Cmd/Ctrl -)">−</button>
      <output id="font-size-display" aria-live="polite">100%</output>
      <button id="font-increase" type="button" aria-label="Increase font size" title="Increase font size (Cmd/Ctrl +)">+</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
